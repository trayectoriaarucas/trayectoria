<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos</title>
    <style>
        /* VARIABLES Y ESTILOS BASE */
        :root {
            --primary: #2563eb; --primary-dark: #1e40af; --dark: #0f172a; 
            --bg: #f8fafc; --text: #334155; --border: #cbd5e1;
            --trans: all 0.3s ease;
            --slider-color: #3b82f6; /* Cambia dinámicamente */
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 100px; }
        button { cursor: pointer; border: none; font-family: inherit; transition: var(--trans); }
        input, select, textarea { font-family: inherit; transition: var(--trans); }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
        
        .hidden { opacity: 0; visibility: hidden; max-height: 0; overflow: hidden; margin: 0 !important; padding: 0 !important; border: none !important; }
        .visible { opacity: 1; visibility: visible; max-height: 3000px; }

        /* BANNER GIGANTE CENTRAL */
        .banner { background: var(--dark); color: white; padding: 30px 40px; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .banner h1 { margin: 0; font-size: 3rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .btn-ajustes { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); text-align: center; color: white; cursor: pointer; padding: 10px; border-radius: 8px; transition: var(--trans); }
        .btn-ajustes:hover { background: rgba(255,255,255,0.1); }
        .btn-ajustes span { font-size: 1.8rem; display: block; margin-bottom: 5px; }

        /* PESTAÑAS */
        .tabs { display: flex; gap: 5px; padding: 0 40px; background: #e2e8f0; border-bottom: 2px solid var(--border); }
        .tab { padding: 15px 35px; background: transparent; font-weight: bold; font-size: 1.1rem; color: #64748b; border-radius: 8px 8px 0 0; margin-top: 10px; }
        .tab.active { background: var(--bg); color: var(--primary); border-top: 4px solid var(--primary); }

        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }

        /* TÍTULO EDITABLE */
        .titulo-lista { font-size: 1.8rem; font-weight: bold; color: var(--dark); border: 2px solid transparent; padding: 5px 10px; border-radius: 6px; display: inline-block; margin-bottom: 20px; width: 100%; box-sizing: border-box;}
        body.modo-edicion .titulo-lista { border-color: var(--primary); background: white; }

        /* 4 BOTONES PRINCIPALES */
        .main-toolbar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn-main { flex: 1; padding: 15px 20px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; background: white; color: var(--dark); border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-main.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* PANELES DE CONTROL */
        .panel { background: white; padding: 25px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-top: 5px solid var(--primary); transition: var(--trans); }
        .panel h2 { margin-top: 0; color: var(--dark); font-size: 1.3rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .btn-action { padding: 10px 18px; border-radius: 6px; font-weight: bold; color: white; background: var(--dark); }
        .btn-action:hover { opacity: 0.85; }

        /* PANEL AÑADIR (Alumno Cero) */
        .input-inline { padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; width: 220px; background: #f8fafc; }
        .btn-tick { background: #16a34a; color: white; font-size: 1.2rem; width: 45px; height: 45px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; transition: var(--trans); }

        /* PANEL FILTRAR (Slider Edad) */
        .slider-container { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; margin-top: 10px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--slider-color); cursor: pointer; margin-top: -8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); transition: background 0.3s; }
        
        /* PANEL ROLES (Emoji Android Style) */
        .emoji-search-box { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid var(--border); }
        .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .emoji-item { font-size: 1.8rem; text-align: center; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .emoji-item:hover { background: #e2e8f0; }
        .emoji-item.selected { background: #bfdbfe; border: 2px solid var(--primary); }
        .rol-creado { display: inline-flex; align-items: center; gap: 8px; background: var(--dark); color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; margin: 5px; }
        
        .agrupar-lista { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 15px; max-height: 250px; overflow-y: auto; }
        .estudiante-check { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #e2e8f0; }

        /* LISTA DE ALUMNOS Y FICHA (Todo Izquierda a Derecha) */
        .student-row { background: white; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: var(--trans); overflow: hidden; border-left: 6px solid var(--primary); }
        .student-header { padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 1.2rem; font-weight: bold; background: white; }
        .student-header:hover { background: #f8fafc; }
        
        .student-body { padding: 25px; border-top: 1px solid #e2e8f0; background: #fafafa; }
        
        /* Layout Lineal (Flexbox de izquierda a derecha) */
        .seccion-lineal { display: flex; flex-wrap: wrap; align-items: center; gap: 15px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .seccion-titulo { width: 100%; font-size: 0.9rem; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 5px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        
        .campo-lineal { display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 8px 15px; border-radius: 6px; border: 1px solid var(--border); }
        .campo-lineal label { font-size: 0.85rem; font-weight: bold; color: #64748b; }
        .campo-lineal input, .campo-lineal select { border: none; background: transparent; font-size: 1rem; font-weight: 600; color: var(--dark); padding: 0; width: 140px;}
        
        /* Bloqueos de Edición */
        body:not(.modo-edicion) .campo-lineal input, body:not(.modo-edicion) .campo-lineal select { pointer-events: none; }
        
        .edad-tag { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .btn-icon { padding: 8px 12px; border-radius: 6px; color: white; font-size: 1rem; }

        /* Académico */
        .btn-acad { background: var(--dark); color: white; padding: 8px 15px; border-radius: 6px; font-weight: bold; }
        .mod-trans { background: #e0f2fe; color: #1e40af; padding: 8px 15px; border-radius: 20px; font-weight: bold; border: 1px solid #bfdbfe; cursor: pointer; }

    </style>
</head>
<body>

    <header class="banner">
        <h1>Base de Datos</h1>
        <div class="btn-ajustes">
            <span>⚙️</span>Ajustes
        </div>
    </header>

    <nav class="tabs">
        <button class="tab active">Alumnos</button>
        <button class="tab" style="opacity: 0.5;">Matemáticas</button>
        <button class="tab" style="opacity: 0.5;">Lengua</button>
    </nav>

    <div class="container">
        
        <input type="text" class="titulo-lista" value="Lista de Alumnos" readonly id="titulo-principal">

        <div class="main-toolbar">
            <button class="btn-main" id="btn-add" onclick="togglePanel('add')">➕ Añadir</button>
            <button class="btn-main" id="btn-edit" onclick="toggleModoEdicion()">✏️ Editar</button>
            <button class="btn-main" id="btn-filter" onclick="togglePanel('filter')">🔍 Filtrar</button>
            <button class="btn-main" id="btn-roles" onclick="togglePanel('roles')">🏷️ Roles</button>
        </div>

        <div id="panel-add" class="panel hidden">
            <h2>Método de Entrada</h2>
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <button class="btn-action bg-dark" onclick="document.getElementById('add-single').classList.remove('hidden')">➕ Añadir solo un alumno</button>
                <button class="btn-action bg-dark">📥 Volcar todo el contenido</button>
            </div>
            
            <div id="add-single" class="hidden" style="background: #e0f2fe; padding: 20px; border-radius: 8px; border-left: 5px solid var(--primary); display: flex; gap: 15px; align-items: center;">
                <input type="text" id="add-nom" class="input-inline" placeholder="Nombre" oninput="checkAlumnoCero()">
                <input type="text" id="add-ape" class="input-inline" placeholder="Apellidos" oninput="checkAlumnoCero()">
                <button id="add-tick" class="btn-tick hidden" onclick="crearAlumno()">✅</button>
            </div>
        </div>

        <div id="panel-filter" class="panel hidden">
            <h2>Filtros de Búsqueda</h2>
            
            <div class="seccion-lineal" style="background: transparent; border: none; padding: 0;">
                <div class="campo-lineal" style="flex-direction: column; align-items: flex-start; width: 300px;">
                    <label>Rango de Edad: <span id="age-label" style="font-size:1.1rem; color:var(--slider-color);">18 - 30</span> años</label>
                    <div class="slider-container">
                        <input type="range" id="age-slider" min="0" max="4" value="0" oninput="updateSliderColor()">
                    </div>
                </div>
                
                <div class="campo-lineal">
                    <label>Género:</label>
                    <select><option>Todos</option><option>♂️ Hombre</option><option>♀️ Mujer</option></select>
                </div>
                
                <div class="campo-lineal">
                    <label>Municipio:</label>
                    <select><option>Todos</option><option>Arucas</option></select>
                </div>

                <div class="campo-lineal">
                    <label>Etiqueta / Rol:</label>
                    <div id="filter-roles-container" style="display:flex; gap:5px; flex-wrap:wrap;">
                        </div>
                </div>
            </div>
        </div>

        <div id="panel-roles" class="panel hidden">
            <h2>Crear y Asignar Roles</h2>
            
            <div style="display: flex; gap: 15px; align-items: center;">
                <button class="btn-action bg-dark" onclick="abrirBuscadorEmojis()">Añadir nuevo rol</button>
            </div>

            <div id="emoji-interface" class="emoji-search-box hidden">
                <div style="display:flex; gap:10px; margin-bottom: 10px;">
                    <input type="text" id="rol-nombre" class="input-inline" placeholder="Nombre del Rol (Ej: Vivero)">
                    <input type="text" id="rol-desc" class="input-inline" placeholder="Breve descripción..." style="flex:1;">
                </div>
                
                <label style="font-weight:bold; color:var(--primary);">Selecciona un Emoji:</label>
                <input type="text" id="emoji-search" class="input-inline" placeholder="🔍 Buscar emoji (ej: agua, planta...)" style="width:100%; margin-top:5px;" oninput="filtrarEmojis()">
                
                <div id="emoji-grid" class="emoji-grid"></div>
                
                <button id="btn-save-rol" class="btn-action bg-success hidden" style="margin-top:15px;" onclick="guardarNuevoRol()">✅ Aplicar y Crear</button>
            </div>

            <div style="margin-top: 25px; border-top: 2px solid #f1f5f9; padding-top: 15px;">
                <h3 style="margin-top:0;">Roles Creados</h3>
                <div id="lista-roles-creados" style="display:flex; flex-wrap:wrap; margin-bottom:15px;"></div>
                
                <h3 style="margin-top:20px;">Agrupar alumnos por rol</h3>
                <div class="campo-lineal" style="width: max-content; margin-bottom: 10px;">
                    <label>Asignar Rol:</label>
                    <select id="mass-role-select"><option value="">Selecciona un rol creado...</option></select>
                </div>
                <div id="mass-student-list" class="agrupar-lista">
                    </div>
                <button class="btn-action bg-primary" style="margin-top:10px;" onclick="aplicarRolMasivo()">Asignar a seleccionados</button>
            </div>
        </div>

        <div id="lista-alumnos">
            </div>

    </div>

    <script>
        // ==========================================
        // ESTADO Y DICCIONARIOS
        // ==========================================
        let alumnos = [];
        let roles = [];
        let selectedEmoji = null;
        
        // Diccionario de emojis (Buscador Semántico)
        const emojiDB = {
            "agua": ["💧","🌊","💦","🧊","🚿"], "vivero planta": ["🌱","🌲","🌳","🪴","🌿","🌻","🚜"],
            "herramienta mantenimiento": ["🔨","🔧","🪛","⛏️","🦺"], "educacion lengua matematica": ["📚","🎓","✏️","📐","📝"],
            "grupo aprendiz": ["👥","👤","🧑‍🤝‍🧑","🧑‍🎓"], "alerta emergencia": ["🚨","⚠️","🛑"],
            "general": ["⭐","✅","🔥","💡","💼","⚖️","💻","⚕️","🧹","🚌","🚑","🎨","🎵"]
        };

        // ==========================================
        // CONTROL DE PANELES Y EDICIÓN
        // ==========================================
        function togglePanel(panelName) {
            const panels = ['add', 'filter', 'roles'];
            panels.forEach(p => {
                const el = document.getElementById(`panel-${p}`);
                const btn = document.getElementById(`btn-${p}`);
                if(p === panelName && el.classList.contains('hidden')) {
                    el.classList.remove('hidden'); el.classList.add('visible');
                    btn.classList.add('active');
                } else {
                    el.classList.remove('visible'); el.classList.add('hidden');
                    btn.classList.remove('active');
                }
            });
            if(panelName !== 'add') {
                document.getElementById('add-single').classList.add('hidden');
                document.getElementById('add-nom').value = ""; document.getElementById('add-ape').value = "";
                checkAlumnoCero();
            }
        }

        function toggleModoEdicion() {
            const body = document.body;
            const btn = document.getElementById('btn-edit');
            const tit = document.getElementById('titulo-principal');
            
            body.classList.toggle('modo-edicion');
            
            if(body.classList.contains('modo-edicion')) {
                btn.classList.add('active');
                tit.removeAttribute('readonly');
                togglePanel('none'); // Cierra otros paneles
            } else {
                btn.classList.remove('active');
                tit.setAttribute('readonly', 'true');
            }
            renderList(); // Muestra/oculta botones de borrar en las filas
        }

        // ==========================================
        // ALUMNO CERO (CREACIÓN DIRECTA)
        // ==========================================
        function checkAlumnoCero() {
            const n = document.getElementById('add-nom').value.trim();
            const a = document.getElementById('add-ape').value.trim();
            const tick = document.getElementById('add-tick');
            if(n.length > 0 && a.length > 0) {
                tick.classList.remove('hidden'); tick.classList.add('visible');
            } else {
                tick.classList.remove('visible'); tick.classList.add('hidden');
            }
        }

        function crearAlumno() {
            const n = document.getElementById('add-nom').value.trim();
            const a = document.getElementById('add-ape').value.trim();
            
            const nuevo = {
                id: Date.now(), nombre: n, apellidos: a,
                dni: "", dob: "", genero: "",
                nacionalidad: "España", cp: "", telefono: "",
                emergencia: { nombre: "", parentesco: "", tel: "" },
                rolesAsignados: [], academicoAbierto: false
            };
            
            alumnos.push(nuevo);
            
            // Resetear Alumno Cero
            document.getElementById('add-nom').value = "";
            document.getElementById('add-ape').value = "";
            checkAlumnoCero();
            
            renderList();
            
            // Abrir automáticamente la ficha del recién creado
            toggleFicha(nuevo.id);
        }

        function borrarAlumno(id, e) {
            e.stopPropagation();
            if(confirm("¿Eliminar alumno?")) {
                alumnos = alumnos.filter(a => a.id !== id);
                renderList();
            }
        }

        // ==========================================
        // SLIDER DE EDAD (COLORES)
        // ==========================================
        const ageRanges = [
            { text: "18 - 30", color: "#3b82f6" }, // Azul
            { text: "31 - 40", color: "#16a34a" }, // Verde
            { text: "41 - 50", color: "#eab308" }, // Amarillo
            { text: "51 - 60", color: "#f97316" }, // Naranja
            { text: "61 - 70", color: "#ef4444" }  // Rojo
        ];

        function updateSliderColor() {
            const val = parseInt(document.getElementById('age-slider').value);
            const label = document.getElementById('age-label');
            const root = document.documentElement;
            
            label.textContent = ageRanges[val].text;
            label.style.color = ageRanges[val].color;
            root.style.setProperty('--slider-color', ageRanges[val].color);
        }

        // ==========================================
        // GESTOR DE ROLES Y EMOJIS ANDROID
        // ==========================================
        function abrirBuscadorEmojis() {
            const el = document.getElementById('emoji-interface');
            el.classList.remove('hidden'); el.classList.add('visible');
            filtrarEmojis();
        }

        function filtrarEmojis() {
            const term = document.getElementById('emoji-search').value.toLowerCase();
            const grid = document.getElementById('emoji-grid');
            grid.innerHTML = "";
            
            let found = [];
            for(let key in emojiDB) {
                if(key.includes(term) || term === "") {
                    found = found.concat(emojiDB[key]);
                }
            }
            
            // Eliminar duplicados si los hubiera
            found = [...new Set(found)];
            
            found.forEach(emo => {
                const div = document.createElement('div');
                div.className = 'emoji-item';
                div.textContent = emo;
                div.onclick = () => {
                    document.querySelectorAll('.emoji-item').forEach(e => e.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedEmoji = emo;
                    checkRolValido();
                };
                grid.appendChild(div);
            });
        }

        function checkRolValido() {
            const nom = document.getElementById('rol-nombre').value.trim();
            const btn = document.getElementById('btn-save-rol');
            if(nom.length > 0 && selectedEmoji) {
                btn.classList.remove('hidden'); btn.classList.add('visible');
            } else {
                btn.classList.remove('visible'); btn.classList.add('hidden');
            }
        }
        document.getElementById('rol-nombre').addEventListener('input', checkRolValido);

        function guardarNuevoRol() {
            const nom = document.getElementById('rol-nombre').value.trim();
            const desc = document.getElementById('rol-desc').value.trim();
            
            roles.push({ id: `rol_${Date.now()}`, nombre: nom, desc: desc, emoji: selectedEmoji });
            
            // Reset
            document.getElementById('rol-nombre').value = "";
            document.getElementById('rol-desc').value = "";
            document.getElementById('emoji-search').value = "";
            selectedEmoji = null;
            document.getElementById('emoji-interface').classList.remove('visible');
            document.getElementById('emoji-interface').classList.add('hidden');
            
            actualizarUI_Roles();
        }

        function actualizarUI_Roles() {
            // Píldoras visuales
            const contPills = document.getElementById('lista-roles-creados');
            contPills.innerHTML = "";
            roles.forEach(r => {
                contPills.innerHTML += `<div class="rol-creado" title="${r.desc}">${r.emoji} ${r.nombre}</div>`;
            });

            // Select de agrupación masiva
            const select = document.getElementById('mass-role-select');
            select.innerHTML = `<option value="">Selecciona un rol creado...</option>`;
            roles.forEach(r => {
                select.innerHTML += `<option value="${r.id}">${r.emoji} ${r.nombre}</option>`;
            });

            renderList(); // Refresca checkbox de alumnos masivos
        }

        function aplicarRolMasivo() {
            const rId = document.getElementById('mass-role-select').value;
            if(!rId) { alert("Selecciona un rol primero."); return; }
            
            const rolData = roles.find(r => r.id === rId);
            const checkboxes = document.querySelectorAll('.mass-student-chk:checked');
            
            checkboxes.forEach(chk => {
                const alId = parseInt(chk.value);
                const al = alumnos.find(a => a.id === alId);
                // Evitar duplicados
                if(!al.rolesAsignados.some(ra => ra.id === rId)) {
                    al.rolesAsignados.push(rolData);
                }
            });
            
            alert(`✅ Se ha asignado el rol ${rolData.emoji} ${rolData.nombre} a los alumnos seleccionados.`);
            renderList();
        }

        // ==========================================
        // RENDERIZADO DE LA LISTA (Ficha Izq a Der)
        // ==========================================
        function renderList() {
            const cont = document.getElementById('lista-alumnos');
            const contMass = document.getElementById('mass-student-list');
            
            cont.innerHTML = "";
            contMass.innerHTML = "";

            const isEdit = document.body.classList.contains('modo-edicion');

            alumnos.forEach((alum, index) => {
                // Inyectar en lista masiva de roles
                contMass.innerHTML += `
                    <label class="estudiante-check">
                        <input type="checkbox" class="mass-student-chk" value="${alum.id}">
                        ${index + 1}. ${alum.nombre} ${alum.apellidos}
                    </label>
                `;

                // Construir fila principal
                const div = document.createElement('div');
                div.className = 'student-row';
                
                // Botón papelera solo en edición
                const btnBorrar = isEdit ? `<button class="btn-icon bg-danger" onclick="borrarAlumno(${alum.id}, event)">🗑️</button>` : '';
                
                // Dibujar roles asignados en el header
                let rolesHTML = alum.rolesAsignados.map(r => `<span style="margin-left:8px; font-size:1.2rem;" title="${r.nombre}">${r.emoji}</span>`).join('');

                // Ficha Lineal (Flex Izquierda a Derecha)
                div.innerHTML = `
                    <div class="student-header" onclick="toggleFicha(${alum.id}, event)">
                        <div>${index + 1}. 👤 ${alum.nombre} ${alum.apellidos} ${rolesHTML}</div>
                        <div>${btnBorrar}</div>
                    </div>
                    
                    <div id="ficha-${alum.id}" class="student-body hidden">
                        
                        <div class="seccion-titulo">A. Datos Personales</div>
                        <div class="seccion-lineal">
                            <div class="campo-lineal"><label>DNI:</label><input type="text" value="${alum.dni}"></div>
                            <div class="campo-lineal">
                                <label>Nacimiento:</label>
                                <input type="date" id="dob-${alum.id}" value="${alum.dob}" onchange="calcEdad(${alum.id})">
                                <span style="font-size:1.2rem;">🎂</span>
                                <span id="edad-${alum.id}" class="edad-tag hidden"></span>
                            </div>
                            <div class="campo-lineal">
                                <label>Género:</label>
                                <select><option value="">-</option><option ${alum.genero==='H'?'selected':''}>♂️ Hombre</option><option ${alum.genero==='M'?'selected':''}>♀️ Mujer</option></select>
                            </div>
                        </div>

                        <div class="seccion-titulo">B. Ubicación y Contacto</div>
                        <div class="seccion-lineal">
                            <div class="campo-lineal">
                                <label>Nacionalidad:</label>
                                <input type="text" value="${alum.nacionalidad}" style="width:100px;">
                                <span style="font-size:1.2rem;">${alum.nacionalidad.toLowerCase()==='españa'?'🇪🇸':''}</span>
                            </div>
                            <div class="campo-lineal">
                                <label>Código Postal:</label>
                                <input type="text" value="${alum.cp}" style="width:80px;" placeholder="354...">
                                <span style="font-size:1.2rem; cursor:pointer;" title="Autocompletar barrio">📍</span>
                            </div>
                            <div class="campo-lineal"><label>Teléfono:</label><input type="text" value="${alum.telefono}" style="width:120px;"></div>
                        </div>

                        <div class="seccion-titulo">C. Datos Académicos</div>
                        <div class="seccion-lineal" style="background: #f8fafc; border-color: var(--primary);">
                            <div id="btn-add-proy-${alum.id}" class="${alum.academicoAbierto ? 'hidden' : 'visible'}">
                                <button class="btn-action bg-primary" onclick="abrirAcademico(${alum.id})">➕ Añadir proyecto</button>
                            </div>
                            
                            <div id="acad-content-${alum.id}" class="${alum.academicoAbierto ? 'visible' : 'hidden'}" style="display:flex; flex-wrap:wrap; gap:10px; align-items:center; width:100%;">
                                <strong style="color:var(--dark);">Trayectoria Arucas:</strong>
                                <span class="mod-trans" onclick="this.classList.toggle('active')">🔘 PRL</span>
                                <span class="mod-trans" onclick="this.classList.toggle('active')">🔘 Medio Ambiente</span>
                                <span class="mod-trans" onclick="this.classList.toggle('active')">🔘 Igualdad</span>
                                <span class="mod-trans" onclick="this.classList.toggle('active')">🔘 Informática</span>
                                <span class="mod-trans" onclick="this.classList.toggle('active')">🔘 Orientación</span>
                                <div style="width:1px; height:30px; background:#cbd5e1; margin: 0 10px;"></div>
                                <button class="btn-acad">📐 Matemáticas</button>
                                <button class="btn-acad">📚 Lengua</button>
                            </div>
                        </div>

                        <div class="seccion-titulo" style="color: var(--danger);">🚨 D. Contacto de Emergencia</div>
                        <div class="seccion-lineal" style="border-color: #fecaca; background: #fff5f5;">
                            <div class="campo-lineal"><label>Nombre:</label><input type="text" value="${alum.emergencia.nombre}"></div>
                            <div class="campo-lineal"><label>Parentesco:</label><input type="text" value="${alum.emergencia.parentesco}"></div>
                            <div class="campo-lineal"><label>Teléfono:</label><input type="text" value="${alum.emergencia.tel}"></div>
                            <button class="btn-action bg-success" onclick="guardarEmergencia(${alum.id})">✅ Confirmar</button>
                        </div>

                    </div>
                `;
                cont.appendChild(div);
                if(alum.dob) calcEdad(alum.id);
            });
        }

        // ==========================================
        // FUNCIONES DE LA FICHA
        // ==========================================
        function toggleFicha(id, e) {
            if(e.target.tagName === 'BUTTON' || e.target.closest('.edit-controls')) return;
            const f = document.getElementById(`ficha-${id}`);
            if(f.classList.contains('hidden')) {
                f.classList.remove('hidden'); f.classList.add('visible');
            } else {
                f.classList.remove('visible'); f.classList.add('hidden');
            }
        }

        function calcEdad(id) {
            const val = document.getElementById(`dob-${id}`).value;
            const disp = document.getElementById(`edad-${id}`);
            if(!val) return;
            
            const age = new Date().getFullYear() - new Date(val).getFullYear();
            disp.textContent = `${age} años`;
            disp.classList.remove('hidden'); disp.classList.add('visible');
            
            if(age <= 30) { disp.style.background = 'var(--age-18)'; disp.style.color = '#0284c7'; }
            else if(age <= 40) { disp.style.background = 'var(--age-31)'; disp.style.color = '#166534'; }
            else if(age <= 50) { disp.style.background = 'var(--age-41)'; disp.style.color = '#854d0e'; }
            else if(age <= 60) { disp.style.background = 'var(--age-51)'; disp.style.color = '#9a3412'; }
            else { disp.style.background = 'var(--age-61)'; disp.style.color = '#991b1b'; }
        }

        function abrirAcademico(id) {
            const alum = alumnos.find(a => a.id === id);
            alum.academicoAbierto = true;
            document.getElementById(`btn-add-proy-${id}`).classList.replace('visible', 'hidden');
            document.getElementById(`acad-content-${id}`).classList.replace('hidden', 'visible');
        }

        function guardarEmergencia(id) {
            alert("✅ Contacto de emergencia confirmado.");
        }

        // Inicializar color del slider
        updateSliderColor();

    </script>
</body>
</html>

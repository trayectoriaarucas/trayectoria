<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos - Ayuntamiento de Arucas</title>
    
    <script id="app-state" type="application/json">{
        "config": {
            "title": "Base de Datos",
            "pestañas": [
                {"id": "plantilla", "title": "Alumnos", "fixed": true}
            ]
        },
        "personal": [
            {
                "id": "p_1",
                "nombre": "Jaime",
                "apellidos": "Falcón Amado",
                "dni": "42000000X",
                "dob": "1980-05-15",
                "genero": "M",
                "estado": "alta",
                "rol": "Técnico",
                "grupo": 1,
                "contacto": {"tel": "600123456", "email": "jaime@email.com", "dir": "Calle Ejemplo 1", "cp": "35411", "barrio": "Bañaderos"},
                "area": "Vivero",
                "academicos": {
                    "transversales": {"prl": true, "medioambiente": false, "igualdad": false, "informatica": true, "orientacion": false}
                },
                "emergencia": {"nombre": "María", "parentesco": "Hermana", "tel": "600987654"}
            }
        ]
    }</script>

    <style>
        /* ESTÉTICA BASADA EN RÚBRICA 13 */
        :root {
            --bg-color: #f4f7f6; 
            --text-color: #333; 
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --color-primary: #3498db; 
            --color-dark: #2c3e50; 
            --color-success: #27ae60; 
            --color-danger: #e74c3c; 
            --color-warning: #f39c12;
            
            /* Colores de Edad */
            --age-18: #e0f2fe; --age-31: #dcfce7; --age-41: #fef08a; --age-51: #fed7aa; --age-61: #fecaca;
        }
        
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* SISTEMA DE PESTAÑAS (Top) */
        .tabs-header { display: flex; background: var(--color-dark); padding: 15px 20px 0 20px; gap: 5px; overflow-x: auto; }
        .tab { background: rgba(255,255,255,0.2); color: white; padding: 12px 25px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: bold; border: none; font-size: 1rem; transition: background 0.2s; }
        .tab:hover { background: rgba(255,255,255,0.4); }
        .tab.active { background: var(--bg-color); color: var(--color-dark); }
        .tab-add { background: var(--color-success); } .tab-add:hover { background: #2ecc71; }

        /* BANNER PRINCIPAL */
        .banner { background-color: var(--color-primary); padding: 20px 30px; color: white; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .banner h1 { margin: 0; font-size: 2rem; }
        
        /* BOTONERA (BARRAS DE HERRAMIENTAS) */
        .toolbar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; flex-wrap: wrap; gap: 10px; border-left: 5px solid var(--color-primary); }
        .toolbar-group { display: flex; gap: 8px; align-items: center; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.95rem; font-weight: bold; color: white; display: inline-flex; align-items: center; gap: 5px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .bg-primary { background-color: var(--color-primary); } .bg-dark { background-color: var(--color-dark); } .bg-success { background-color: var(--color-success); } .bg-danger { background-color: var(--color-danger); } .bg-warning { background-color: var(--color-warning); }

        /* LISTA DE ALUMNOS (ACORDEÓN ESTILO RÚBRICA 13) */
        details.student-detail { margin-bottom: 15px; border-radius: 8px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.1); background: #fff; border-left: 6px solid var(--age-18); }
        details.student-detail > summary { padding: 15px 20px; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #eee; transition: background 0.2s; }
        details.student-detail > summary::-webkit-details-marker { display: none; }
        details.student-detail > summary:hover { background: #fdfdfd; }
        
        .summary-content { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; width: 100%; }
        .student-name { font-weight: bold; font-size: 1.1rem; color: var(--color-dark); min-width: 220px; }
        
        /* PÍLDORAS VISUALES */
        .pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; border: 1px solid #ddd; background: #f9f9f9; color: var(--color-dark); }
        
        /* CONTENIDO DESPLEGABLE (4 BLOQUES) */
        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; background: #fafafa; }
        .detail-block { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .detail-block h3 { margin: 0 0 15px 0; font-size: 1.05rem; color: var(--color-dark); border-bottom: 2px solid #f4f7f6; padding-bottom: 8px; }
        
        .data-row { margin-bottom: 12px; display: flex; flex-direction: column; }
        .data-row label { font-size: 0.85rem; color: #7f8c8d; font-weight: bold; margin-bottom: 4px; }
        .data-row input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 0.95rem; }
        .data-row input:disabled { background: transparent; border: none; padding: 0; color: var(--text-color); font-weight: 500; }

        /* ACADÉMICOS Y MÓDULOS TRANSVERSALES */
        .academic-columns { display: flex; gap: 20px; flex-wrap: wrap; }
        .col-left { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 10px; }
        .col-right { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
        
        .subject-card { background: var(--color-dark); color: white; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .subject-card:hover { transform: translateY(-2px); }
        
        .module-btn { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; border-radius: 6px; text-align: left; font-weight: bold; color: #7f8c8d; cursor: default; display: flex; align-items: center; gap: 10px; }
        .module-btn.active { background: #eef7f2; border-color: var(--color-success); color: var(--color-success); }

        /* MODOS DE EDICIÓN */
        .edit-controls { display: none; }
        .mode-edit .edit-controls { display: inline-flex; }
        .mode-edit .read-controls { display: none; }
        .mode-edit .data-row input:disabled { background: #fff; border: 1px solid #ccc; padding: 8px; pointer-events: auto; }
        .mode-edit .module-btn { cursor: pointer; }

    </style>
</head>
<body>

    <div class="tabs-header" id="tabs-container">
        <button class="tab active">Alumnos</button>
        <button class="tab tab-add">➕ Añadir Asignatura</button>
    </div>

    <div class="container">
        <div class="banner">
            <h1 id="app-title">Base de Datos</h1>
            <button class="btn bg-dark" title="Galería de Fondos Temáticos">🖼️</button>
        </div>

        <div class="toolbar">
            <div class="toolbar-group">
                <button class="btn bg-dark read-controls">📝 Añadir Masivo</button>
                <button class="btn bg-dark read-controls">🔍 Filtrar / Etiquetas</button>
                <button class="btn bg-primary read-controls" onclick="toggleEditMode()">✏️ Modo Edición</button>
                
                <button class="btn bg-success edit-controls" onclick="toggleEditMode()">✅ Confirmar</button>
                <button class="btn bg-dark edit-controls" onclick="toggleEditMode()">❌ Cancelar</button>
                <button class="btn bg-danger edit-controls" onclick="borrarTodo()">🗑️ Borrar Todo</button>
            </div>

            <div class="toolbar-group">
                <button class="btn bg-dark">🔀 Alternar Formato</button>
                <button class="btn bg-dark">🔤 Ordenar A-Z</button>
                <button class="btn bg-dark">⚙️ Ajustes</button>
            </div>
        </div>

        <div id="students-container">
            </div>
    </div>

    <script>
        // CARGA DE DATOS DESDE EL HTML
        let state = JSON.parse(document.getElementById('app-state').textContent);
        
        const emojis = {
            roles: { "Aprendiz": "🧑‍🎓", "Maestro": "📜", "Técnico": "🔧", "Técnico Administrativo": "💼", "Capataz": "🦺" },
            areas: { "Vivero": "🌱", "Vías y Obras": "🔨", "Educación": "🖌️" }
        };

        // INICIALIZACIÓN
        function initApp() {
            renderStudents();
        }

        // CONTROL DEL MODO EDICIÓN
        function toggleEditMode() {
            document.body.classList.toggle('mode-edit');
            renderStudents(); // Refresca para activar inputs
        }

        function borrarTodo() {
            if(confirm("⚠️ AVISO: ¿Quieres borrar todos los campos?\nSe eliminarán todos los alumnos menos el último, que quedará limpio.")) {
                alert("Función en desarrollo para el siguiente paso.");
            }
        }

        // DIBUJAR LA LISTA
        function renderStudents() {
            const container = document.getElementById('students-container');
            container.innerHTML = "";
            const isEdit = document.body.classList.contains('mode-edit');

            state.personal.forEach((p, idx) => {
                const det = document.createElement('details');
                det.className = 'student-detail';
                
                const rolEmoji = emojis.roles[p.rol] || '❓';
                const areaEmoji = emojis.areas[p.area] || '📍';
                const estadoTxt = p.estado === 'alta' ? '▶️ Alta' : '⏸️ Baja';

                // BOTONES INDIVIDUALES (Solo visibles en modo edición global)
                const actionBtns = isEdit 
                    ? `<button class="btn bg-primary" style="padding: 6px 10px;">✏️</button>
                       <button class="btn bg-danger" style="padding: 6px 10px; margin-left: 5px;">🗑️</button>` 
                    : ``;

                // SUMMARY: Píldoras de izquierda a derecha
                const summaryHTML = `
                    <summary>
                        <div class="summary-content">
                            <div class="student-name">👤 ${p.nombre} ${p.apellidos}</div>
                            <span class="pill">${rolEmoji} ${p.rol}</span>
                            <span class="pill">${areaEmoji} ${p.area}</span>
                            <span class="pill">1️⃣ Grupo ${p.grupo}</span>
                            <span class="pill">${estadoTxt}</span>
                        </div>
                        <div>${actionBtns}</div>
                    </summary>
                `;

                // CONTENIDO EXPANDIDO: 4 Bloques
                const contentHTML = `
                    <div class="content-grid">
                        <div class="detail-block">
                            <h3>A. Datos Personales</h3>
                            <div class="data-row"><label>🪪 DNI/NIE:</label><input type="text" value="${p.dni}" disabled></div>
                            <div class="data-row"><label>🎂 Nacimiento:</label><input type="date" value="${p.dob}" disabled></div>
                            <div class="data-row"><label>Género:</label><input type="text" value="${p.genero === 'M' ? '♂️ Hombre' : '♀️ Mujer'}" disabled></div>
                        </div>

                        <div class="detail-block">
                            <h3>B. Ubicación y Contacto</h3>
                            <div class="data-row"><label>📞 Teléfono:</label><input type="text" value="${p.contacto.tel}" disabled></div>
                            <div class="data-row"><label>🏠 Dirección:</label><input type="text" value="${p.contacto.dir}" disabled></div>
                            <div class="data-row"><label>📍 CP y Barrio:</label><input type="text" value="${p.contacto.cp} - ${p.contacto.barrio}" disabled></div>
                        </div>

                        <div class="detail-block" style="grid-column: 1 / -1;">
                            <h3>C. Gestión Académica</h3>
                            <div class="academic-columns">
                                <div class="col-left">
                                    <div class="subject-card">📚 Lengua Castellana N2</div>
                                    <div class="subject-card">📐 Matemáticas N2</div>
                                </div>
                                <div class="col-right">
                                    <div class="module-btn ${p.academicos.transversales.prl ? 'active' : ''}">${p.academicos.transversales.prl ? '✅' : '🔘'} Prevención de Riesgos (PRL)</div>
                                    <div class="module-btn ${p.academicos.transversales.medioambiente ? 'active' : ''}">${p.academicos.transversales.medioambiente ? '✅' : '🔘'} Medio Ambiente</div>
                                    <div class="module-btn ${p.academicos.transversales.igualdad ? 'active' : ''}">${p.academicos.transversales.igualdad ? '✅' : '🔘'} Igualdad</div>
                                    <div class="module-btn ${p.academicos.transversales.informatica ? 'active' : ''}">${p.academicos.transversales.informatica ? '✅' : '🔘'} Informática</div>
                                    <div class="module-btn ${p.academicos.transversales.orientacion ? 'active' : ''}">${p.academicos.transversales.orientacion ? '✅' : '🔘'} Orientación Laboral</div>
                                </div>
                            </div>
                        </div>

                        <div class="detail-block">
                            <h3>D. Emergencia</h3>
                            <div class="data-row"><label>🚨 Contacto de aviso:</label><input type="text" value="${p.emergencia.nombre}" disabled></div>
                            <div class="data-row"><label>Vínculo / Parentesco:</label><input type="text" value="${p.emergencia.parentesco}" disabled></div>
                            <div class="data-row"><label>Teléfono Directo:</label><input type="text" value="${p.emergencia.tel}" disabled></div>
                        </div>
                    </div>
                `;

                det.innerHTML = summaryHTML + contentHTML;
                container.appendChild(det);
            });
        }

        initApp();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos</title>
    
    <script id="app-state" type="application/json">
    {
        "personal": [],
        "etiquetas": [
            {"id": "t1", "emoji": "🌱", "nombre": "Vivero"},
            {"id": "t2", "emoji": "🔨", "nombre": "Vías y Obras"},
            {"id": "t3", "emoji": "🔧", "nombre": "Técnico"}
        ]
    }
    </script>

    <style>
        /* VARIABLES Y ESTILOS BASE */
        :root {
            --bg-body: #f4f7f6;
            --text-main: #2c3e50;
            --primary: #3498db;
            --dark: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --border-color: #cbd5e1;
            --anim-speed: 0.4s; /* Velocidad de fundidos */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 50px;
        }
        .app-container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ANIMACIONES Y FUNDIDOS GLOBALES */
        .fade-in {
            opacity: 0;
            transform: translateY(-10px);
            animation: fadeInAnim var(--anim-speed) ease forwards;
        }
        .fade-out {
            opacity: 1;
            transition: opacity var(--anim-speed) ease;
        }
        @keyframes fadeInAnim {
            to { opacity: 1; transform: translateY(0); }
        }

        /* BANNER Y PESTAÑAS */
        .main-banner {
            background: var(--primary); color: white;
            padding: 30px; border-radius: 12px; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .main-banner h1 { margin: 0; font-size: 2.5rem; }
        
        .tabs-container { display: flex; gap: 8px; border-bottom: 3px solid var(--border-color); margin-bottom: 20px; }
        .tab {
            padding: 12px 25px; background: #e2e8f0; color: var(--text-main);
            border: none; border-radius: 8px 8px 0 0; font-weight: bold; cursor: pointer;
            transition: background var(--anim-speed) ease;
        }
        .tab.active { background: white; border-top: 4px solid var(--primary); color: var(--primary); }

        /* BOTONERAS SUPERIORES */
        .toolbar {
            display: flex; justify-content: space-between; background: white;
            padding: 15px; border-radius: 8px; margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .toolbar-group { display: flex; gap: 10px; }
        .btn {
            padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; color: white;
            cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
            transition: opacity var(--anim-speed) ease, background var(--anim-speed) ease;
        }
        .btn:hover { opacity: 0.8; }
        .bg-dark { background: var(--dark); } .bg-primary { background: var(--primary); } .bg-success { background: var(--success); }

        /* BARRA DE CREACIÓN DE ALUMNO */
        .crear-alumno-bar {
            background: white; padding: 15px 20px; border-radius: 8px;
            display: flex; gap: 15px; align-items: center; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 5px solid var(--primary);
        }
        .input-base {
            padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;
            font-size: 1rem; width: 200px; transition: border var(--anim-speed) ease;
        }
        .input-base:focus { border-color: var(--primary); outline: none; }
        
        /* Botón de confirmar creación oculto por defecto */
        #btn-confirmar-creacion {
            opacity: 0; visibility: hidden; transform: scale(0.9);
            transition: all var(--anim-speed) ease;
        }
        #btn-confirmar-creacion.show {
            opacity: 1; visibility: visible; transform: scale(1);
        }

        /* FICHA DEL ALUMNO (Desplegable suave) */
        .alumno-card {
            background: white; border-radius: 8px; margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); overflow: hidden;
            transition: all var(--anim-speed) ease;
        }
        .alumno-header {
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; border-bottom: 1px solid transparent;
            transition: background var(--anim-speed) ease;
        }
        .alumno-header:hover { background: #f8fafc; }
        .alumno-nombre-tit { font-size: 1.2rem; font-weight: bold; }
        
        /* Contenido expandible */
        .alumno-body {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.5s ease-in-out;
            background: #f8fafc;
        }
        .alumno-card.open .alumno-body {
            max-height: 2500px; /* Suficiente para expandir */
            opacity: 1; border-top: 1px solid var(--border-color);
        }

        /* BLOQUES INTERNOS DE LA FICHA */
        .bloques-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .bloque { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
        .bloque.full { grid-column: 1 / -1; }
        .bloque-tit { font-size: 1.1rem; color: var(--primary); margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        
        .form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .form-row label { font-size: 0.85rem; font-weight: bold; color: #7f8c8d; }
        
        /* Botones de acción dentro de la ficha */
        .btn-accion-ficha {
            background: #e2e8f0; color: var(--dark); border: none; padding: 8px 12px;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: all var(--anim-speed) ease;
        }
        .btn-accion-ficha:hover { background: #cbd5e1; }
        
        /* Etiquetas / Roles */
        .tags-container { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .tag-pill {
            background: #f1f5f9; border: 1px solid #cbd5e1; padding: 5px 12px;
            border-radius: 20px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
        }
        .tag-pill.active { background: var(--success); color: white; border-color: var(--success); }

        /* Barra Académica */
        .academico-box { border: 1px dashed var(--primary); padding: 15px; border-radius: 8px; background: #f0f8ff; text-align: center;}
        .modulos-transversales { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; display: none; }
        .modulos-transversales.show { display: flex; animation: fadeInAnim var(--anim-speed) ease forwards; }
        .mod-btn { text-align: left; background: white; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; }

    </style>
</head>
<body>

    <div class="app-container">
        <header class="main-banner">
            <h1>Base de Datos</h1>
        </header>

        <nav class="tabs-container">
            <button class="tab active">Alumnos</button>
            <button class="tab" style="opacity:0.5; cursor:not-allowed;" title="Aún no enlazada">Matemáticas</button>
            <button class="tab" style="opacity:0.5; cursor:not-allowed;" title="Aún no enlazada">Lengua</button>
        </nav>

        <div class="toolbar">
            <div class="toolbar-group">
                <button class="btn bg-dark">📥 Volcar Datos</button>
                <button class="btn bg-dark">🔍 Filtrar / Etiquetas</button>
                <button class="btn bg-primary">✏️ Modo Edición</button>
            </div>
            <div class="toolbar-group">
                <button class="btn bg-dark">🔀 Formato Nombre</button>
                <button class="btn bg-dark">🔤 Ordenar A-Z</button>
            </div>
        </div>

        <div class="crear-alumno-bar">
            <strong>👤 Nuevo Alumno:</strong>
            <input type="text" id="input-nombre" class="input-base" placeholder="Nombre" oninput="comprobarInputs()">
            <input type="text" id="input-apellidos" class="input-base" placeholder="Apellidos" oninput="comprobarInputs()">
            <button id="btn-confirmar-creacion" class="btn bg-success" onclick="crearAlumno()">✅ Confirmar</button>
        </div>

        <main id="lista-alumnos">
            </main>
    </div>

    <script>
        // Lógica de Estado
        let appState = JSON.parse(document.getElementById('app-state').textContent);
        let studentCount = 0;

        // 1. Lógica de Input (Aparecer Tick Verde con fundido)
        function comprobarInputs() {
            const nom = document.getElementById('input-nombre').value.trim();
            const ape = document.getElementById('input-apellidos').value.trim();
            const btn = document.getElementById('btn-confirmar-creacion');
            
            if(nom.length > 0 && ape.length > 0) {
                btn.classList.add('show');
            } else {
                btn.classList.remove('show');
            }
        }

        // 2. Crear Alumno y volcarlo a la lista
        function crearAlumno() {
            const nom = document.getElementById('input-nombre').value.trim();
            const ape = document.getElementById('input-apellidos').value.trim();
            
            const nuevoID = 'alum_' + studentCount++;
            
            // Añadir al HTML
            const container = document.getElementById('lista-alumnos');
            const alumDiv = document.createElement('div');
            alumDiv.className = 'alumno-card fade-in';
            alumDiv.id = nuevoID;
            
            alumDiv.innerHTML = `
                <div class="alumno-header" onclick="toggleFicha('${nuevoID}')">
                    <div class="alumno-nombre-tit">👤 ${nom} ${ape}</div>
                    <div id="resumen-tags-${nuevoID}">▶️ Alta</div>
                </div>
                
                <div class="alumno-body">
                    <div class="bloques-grid">
                        
                        <div class="bloque">
                            <h3 class="bloque-tit">Datos Personales</h3>
                            <div class="form-row">
                                <label>🪪 DNI/NIE</label>
                                <input type="text" class="input-base">
                            </div>
                            <div class="form-row">
                                <label>🎂 Fecha de Nacimiento</label>
                                <div style="display:flex; gap:10px; align-items:center;">
                                    <input type="date" class="input-base" id="dob-${nuevoID}">
                                    <button class="btn-accion-ficha" onclick="calcularEdad('${nuevoID}')" title="Calcular Edad">🎂</button>
                                    <span id="edad-resultado-${nuevoID}" style="font-weight:bold; color:var(--primary); transition:opacity 0.4s; opacity:0;"></span>
                                </div>
                            </div>
                            <div class="form-row">
                                <label>Género</label>
                                <select class="input-base">
                                    <option value="">Seleccionar...</option>
                                    <option value="H">♂️ Hombre</option>
                                    <option value="M">♀️ Mujer</option>
                                </select>
                            </div>
                        </div>

                        <div class="bloque">
                            <h3 class="bloque-tit">Datos de Contacto</h3>
                            <div class="form-row">
                                <label>📞 Teléfono</label>
                                <input type="text" class="input-base">
                            </div>
                            <div class="form-row">
                                <label>📧 Email</label>
                                <input type="text" class="input-base">
                            </div>
                            <div class="form-row">
                                <label>📍 Municipio / Dirección</label>
                                <input type="text" class="input-base" placeholder="Ej: Arucas">
                            </div>
                        </div>

                        <div class="bloque full">
                            <h3 class="bloque-tit">Roles y Etiquetas Asignadas</h3>
                            <p style="font-size:0.85rem; color:#7f8c8d; margin:0;">Selecciona las etiquetas (vinculadas a la gestión central de la lupa):</p>
                            <div class="tags-container" id="tags-${nuevoID}">
                                ${generarBotonesEtiquetas()}
                            </div>
                        </div>

                        <div class="bloque">
                            <h3 class="bloque-tit">Datos Académicos</h3>
                            <div id="academico-vacio-${nuevoID}" class="academico-box">
                                <button class="btn bg-primary" onclick="añadirProyecto('${nuevoID}')">➕ Añadir Proyecto/Curso</button>
                            </div>
                            
                            <div id="academico-lleno-${nuevoID}" class="modulos-transversales">
                                <strong>📚 Proyecto: Trayectoria Arucas</strong>
                                <p style="font-size:0.8rem; color:#e74c3c; margin:0;">(Las pestañas de Lengua y Matemáticas aún no están enlazadas al sistema. Crealas arriba primero).</p>
                                <hr style="border:0; border-top:1px solid #ccc; width:100%;">
                                <button class="mod-btn" onclick="toggleBtn(this)">🔘 PRL (Prevención Riesgos)</button>
                                <button class="mod-btn" onclick="toggleBtn(this)">🔘 Medio Ambiente</button>
                                <button class="mod-btn" onclick="toggleBtn(this)">🔘 Igualdad</button>
                                <button class="mod-btn" onclick="toggleBtn(this)">🔘 Informática</button>
                                <button class="mod-btn" onclick="toggleBtn(this)">🔘 Orientación Laboral</button>
                            </div>
                        </div>

                        <div class="bloque">
                            <h3 class="bloque-tit">Contacto de Emergencia</h3>
                            <div class="form-row">
                                <label>Nombre de la Persona</label>
                                <input type="text" class="input-base" placeholder="Nombre completo">
                            </div>
                            <div class="form-row">
                                <label>Parentesco</label>
                                <input type="text" class="input-base" placeholder="Ej: Hermano, Pareja...">
                            </div>
                            <div class="form-row">
                                <label>Teléfono</label>
                                <input type="text" class="input-base" placeholder="Teléfono directo">
                            </div>
                        </div>

                        <div class="bloque full" style="text-align:right; border:none; padding-top:0;">
                            <button class="btn bg-success" onclick="cerrarYConfirmar('${nuevoID}')">✅ Confirmar Datos de Ficha</button>
                        </div>
                    </div>
                </div>
            `;
            
            container.appendChild(alumDiv);
            
            // Limpiar inputs superiores y ocultar tick
            document.getElementById('input-nombre').value = '';
            document.getElementById('input-apellidos').value = '';
            comprobarInputs();
        }

        // 3. Funciones Interactivas de la Ficha
        function toggleFicha(id) {
            const card = document.getElementById(id);
            card.classList.toggle('open');
        }

        function cerrarYConfirmar(id) {
            alert("Datos guardados en el sistema.");
            document.getElementById(id).classList.remove('open');
        }

        // 4. Calcular Edad con Fundido
        function calcularEdad(id) {
            const dateInput = document.getElementById(`dob-${id}`).value;
            const resSpan = document.getElementById(`edad-resultado-${id}`);
            
            if(!dateInput) {
                alert("Introduce una fecha primero.");
                return;
            }
            
            // Cálculo básico simulado
            const birth = new Date(dateInput);
            const hoy = new Date();
            let edad = hoy.getFullYear() - birth.getFullYear();
            
            // Mostrar con fundido
            resSpan.textContent = `Tiene ${edad} años`;
            resSpan.style.opacity = 1; 
        }

        // 5. Gestión Académica (Añadir Proyecto)
        function añadirProyecto(id) {
            const nombreProy = prompt("Introduce el nombre del proyecto (Ej: Trayectoria Arucas):", "Trayectoria Arucas");
            if(nombreProy) {
                // Ocultar botón de añadir
                document.getElementById(`academico-vacio-${id}`).style.display = 'none';
                // Mostrar módulos con fundido
                const lleno = document.getElementById(`academico-lleno-${id}`);
                lleno.classList.add('show');
            }
        }

        // 6. Generar Etiquetas Base
        function generarBotonesEtiquetas() {
            let html = "";
            appState.etiquetas.forEach(t => {
                html += `<button class="tag-pill" onclick="this.classList.toggle('active')">${t.emoji} ${t.nombre}</button>`;
            });
            return html;
        }

        // Botones toggle genericos
        function toggleBtn(btn) {
            if(btn.innerHTML.includes('🔘')) {
                btn.innerHTML = btn.innerHTML.replace('🔘', '✅');
                btn.style.background = '#dcfce7';
                btn.style.borderColor = 'var(--success)';
            } else {
                btn.innerHTML = btn.innerHTML.replace('✅', '🔘');
                btn.style.background = 'white';
                btn.style.borderColor = 'var(--border-color)';
            }
        }
    </script>
</body>
</html>

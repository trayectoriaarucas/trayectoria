<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Lengua Castellana - Rúbrica Completa</title>
    
    <!-- AQUÍ SE GUARDARÁN LOS DATOS AL EXPORTAR -->
    <script id="saved-data" type="application/json">{}</script>

    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --color-a: #3498db;
            --color-b: #9b59b6;
            --color-c: #e67e22;
        }
        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        h1 { margin-bottom: 5px; }
        h2 { font-size: 1.1rem; margin-bottom: 25px; font-weight: normal; color: #7f8c8d; }
        
        .container { max-width: 950px; margin: 0 auto; }
        
        /* Controles Globales */
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #2ecc71;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-export { background-color: #27ae60; }
        .btn-clear { background-color: #e74c3c; }

        /* Estilos del Desplegable Principal */
        details.student-detail {
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            background: #fff;
        }
        details.student-detail > summary {
            padding: 18px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            transition: opacity 0.2s;
        }
        details.student-detail > summary::-webkit-details-marker { display: none; }
        details.student-detail > summary:hover { opacity: 0.9; }
        
        .header-score {
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 1.1rem;
        }

        .content { padding: 20px; background: #fafafa; }

        /* Botones de las 3 Partes */
        .cards-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .part-card {
            flex: 1;
            border-radius: 12px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .part-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .part-card.card-a { background-color: var(--color-a); }
        .part-card.card-b { background-color: var(--color-b); }
        .part-card.card-c { background-color: var(--color-c); }
        
        .part-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
        .part-card .score-display { font-size: 1.5rem; font-weight: bold; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 8px; }

        /* Vistas interiores de las Partes */
        .part-view {
            display: none;
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #eee;
        }
        .part-view h3 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .btn-back { background: #7f8c8d; color: white; padding: 6px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-back:hover { background: #95a5a6; }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { font-weight: 600; color: #333; background: #f9f9f9; }
        input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            text-align: center;
        }
        input[type="number"]::placeholder { color: #aaa; font-size: 0.85rem; }

        /* Faltas y Total */
        .global-section {
            background: #fff;
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
            flex-wrap: wrap;
            gap: 15px;
        }
        .faltas-box { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #c0392b; }
        .faltas-box input { border-color: #e74c3c; color: #c0392b; font-weight: bold; }
        
        .total-box { font-size: 1.2rem; font-weight: bold; color: #2c3e50; }
        .total-box span { font-size: 1.6rem; color: #27ae60; background: #eef7f2; padding: 5px 15px; border-radius: 8px; margin-left: 10px; border: 1px solid #cce5d6; }

        /* Acordeón Temático */
        details.thematic-details {
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #bdc3c7;
            background: #fff;
        }
        details.thematic-details > summary {
            padding: 12px 15px;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            background: #ecf0f1;
        }
        .thematic-content { padding: 15px; }
        .question-row { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .question-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .question-text { font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; color: #444; }
        .options-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .opt-btn {
            padding: 6px 14px; border: 1px solid #ccc; background: #fff;
            border-radius: 20px; cursor: pointer; font-size: 0.85rem; color: #666;
        }
        .opt-btn.active-mucho { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; font-weight: bold; }
        .opt-btn.active-bastante { background-color: #3498db !important; color: white !important; border-color: #2980b9 !important; font-weight: bold; }
        .opt-btn.active-poco { background-color: #e67e22 !important; color: white !important; border-color: #d35400 !important; font-weight: bold; }
        .opt-btn.active-nada { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; font-weight: bold; }

        @media(max-width: 768px) {
            .cards-container { flex-direction: column; }
            .global-section { flex-direction: column; align-items: stretch; }
            .total-box { text-align: center; margin-top: 10px; }
            .options-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Examen: Lengua Castellana</h1>
        <h2>Evaluación de Comprensión, Lengua y Redacción</h2>
        
        <div class="actions">
            <div>
                <p style="margin: 0 0 5px 0;"><strong>💾 Estado:</strong> <span id="save-status" style="color:#27ae60; font-weight:bold;">Listo para evaluar</span></p>
                <p style="margin: 0; color: #2c3e50;"><strong>📤 Para enviar/guardar:</strong> Haz clic en el botón verde para descargar el archivo con todas las notas.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-export" onclick="exportarArchivo()">Descargar Archivo con Notas</button>
                <button class="btn btn-clear" onclick="limpiarDatos()">Borrar Todo</button>
            </div>
        </div>

        <div id="students-container"></div>
    </div>

    <script>
        const students = [
            "Wenceslaa", "Julia (Mª del Pino)", "Carmelo", "Lupe", "Sonia",
            "Fela", "Francisco", "Begoña", "Araceli", "Fefi",
            "Eugenia", "Luz", "Víctor", "Pepe", "Javier",
            "Domingo", "Olegario", "Luis"
        ];

        const partA = [
            { id: 'a0', label: '1.1', max: 1.0 },
            { id: 'a1', label: '1.2', max: 1.0 },
            { id: 'a2', label: '1.3', max: 1.0 },
            { id: 'a3', label: '1.4', max: 1.0 }
        ];

        const partB = [
            { id: 'b0', label: '1.5', max: 0.4 },
            { id: 'b1', label: '1.6', max: 0.6 },
            { id: 'b2', label: '1.7', max: 0.5 },
            { id: 'b3', label: '1.8', max: 0.8 },
            { id: 'b4', label: '1.9', max: 0.7 }
        ];

        const partC = [
            { id: 'c0', label: 'Extensión mínima de 10 líneas', max: 0.5 },
            { id: 'c1', label: 'Estructura (encabezado, cuerpo y despedida)', max: 0.5 },
            { id: 'c2', label: 'Expresión escrita clara', max: 0.2 },
            { id: 'c3', label: 'Normas gramaticales y ortográficas', max: 0.6 },
            { id: 'c4', label: 'Ajuste a la temática, org. de ideas, coherencia y vocabulario', max: 1.0 },
            { id: 'c5', label: 'Presentación y limpieza', max: 0.2 }
        ];

        const thematicQuestions = [
            "1. ¿Menciona o reflexiona sobre la seguridad y los riesgos del mayor como PEATÓN?",
            "2. ¿Trata las recomendaciones específicas para el mayor como CONDUCTOR?",
            "3. ¿Incluye pautas o precauciones para el uso seguro del TRANSPORTE PÚBLICO?",
            "4. ¿Vincula la seguridad vial con el mantenimiento de la AUTONOMÍA y la salud?",
            "5. ¿Conecta los datos del texto de apoyo con la CONCIENCIACIÓN SOCIAL solicitada?"
        ];
        const optionLabels = ["Mucho / Excelente", "Bastante / Adecuado", "Poco / Superficial", "Nada / No lo trata"];

        const colors = [
            "#34495e", "#8e44ad", "#2980b9", "#c0392b", "#d35400",
            "#16a085", "#27ae60", "#f39c12", "#e67e22", "#e74c3c",
            "#9b59b6", "#8e44ad", "#2c3e50", "#f1c40f", "#1abc9c",
            "#2ecc71", "#3498db", "#95a5a6"
        ];

        let state = {};
        
        function initData() {
            try {
                const embeddedJSON = JSON.parse(document.getElementById('saved-data').textContent);
                if (Object.keys(embeddedJSON).length > 0) {
                    state = embeddedJSON;
                    localStorage.setItem('rubrica_datos_seguros', JSON.stringify(state));
                } else {
                    state = JSON.parse(localStorage.getItem('rubrica_datos_seguros')) || {};
                }
            } catch (e) {
                state = JSON.parse(localStorage.getItem('rubrica_datos_seguros')) || {};
            }
        }

        function saveState() {
            try {
                localStorage.setItem('rubrica_datos_seguros', JSON.stringify(state));
                const statusEl = document.getElementById('save-status');
                statusEl.innerText = "✓ Guardado en memoria";
                statusEl.style.color = "#27ae60";
                setTimeout(() => { statusEl.style.color = "#2c3e50"; }, 1500);
            } catch(e) {
                document.getElementById('save-status').innerText = "⚠ Aviso: Memoria local bloqueada por tu navegador";
            }
        }

        function limpiarDatos() {
            if(confirm("¿Seguro que quieres BORRAR TODAS LAS NOTAS? Esta acción no se puede deshacer.")) {
                localStorage.removeItem('rubrica_datos_seguros');
                document.getElementById('saved-data').textContent = "{}";
                location.reload();
            }
        }

        function exportarArchivo() {
            try {
                document.getElementById('saved-data').textContent = JSON.stringify(state);
                let htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
                const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = "Rubrica_Alumnos_Evaluada.html";
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                alert("¡Descarga completada! Revisa tu carpeta de Descargas.");
            } catch(e) {
                alert("Hubo un error al crear el archivo.");
                console.error(e);
            }
        }

        function showPart(sIdx, part) {
            document.getElementById(`s${sIdx}_cards`).style.display = 'none';
            document.getElementById(`s${sIdx}_global`).style.display = 'none';
            document.getElementById(`s${sIdx}_viewA`).style.display = part === 'A' ? 'block' : 'none';
            document.getElementById(`s${sIdx}_viewB`).style.display = part === 'B' ? 'block' : 'none';
            document.getElementById(`s${sIdx}_viewC`).style.display = part === 'C' ? 'block' : 'none';
        }

        function showCards(sIdx) {
            document.getElementById(`s${sIdx}_cards`).style.display = 'flex';
            document.getElementById(`s${sIdx}_global`).style.display = 'flex';
            document.getElementById(`s${sIdx}_viewA`).style.display = 'none';
            document.getElementById(`s${sIdx}_viewB`).style.display = 'none';
            document.getElementById(`s${sIdx}_viewC`).style.display = 'none';
        }

        function calculatePart(sIdx, partArray, prefix) {
            let total = 0;
            partArray.forEach((item, i) => {
                const el = document.getElementById(`s${sIdx}_${prefix}${i}`);
                
                // Si la casilla está vacía, no calculamos valor, lo tratamos como 0, 
                // pero NO ponemos "0" en la casilla visualmente.
                let val = 0;
                if (el.value !== "") {
                    val = parseFloat(el.value);
                    if (isNaN(val)) val = 0;
                    
                    if (val > item.max) { val = item.max; el.value = val; }
                    if (val < 0) { val = 0; el.value = 0; }
                }
                
                total += val;
                
                if(!state[sIdx]) state[sIdx] = {};
                // Guardamos el valor actual (incluso si es string vacío para mantener el estado)
                state[sIdx][`${prefix}${i}`] = el.value !== "" ? val : "";
            });
            return total;
        }

        function updateScore(sIdx) {
            const totalA = calculatePart(sIdx, partA, 'a');
            const totalB = calculatePart(sIdx, partB, 'b');
            const totalC = calculatePart(sIdx, partC, 'c');

            const faltasEl = document.getElementById(`s${sIdx}_faltas`);
            let faltas = 0;
            if (faltasEl.value !== "") {
                faltas = parseInt(faltasEl.value);
                if (isNaN(faltas) || faltas < 0) { faltas = 0; faltasEl.value = 0; }
            }
            if(!state[sIdx]) state[sIdx] = {};
            state[sIdx]['faltas'] = faltasEl.value !== "" ? faltas : "";

            document.getElementById(`s${sIdx}_btnA_score`).innerText = totalA.toFixed(2);
            document.getElementById(`s${sIdx}_btnB_score`).innerText = totalB.toFixed(2);
            document.getElementById(`s${sIdx}_btnC_score`).innerText = totalC.toFixed(2);

            let notaFinal = (totalA + totalB + totalC) - (faltas * 0.1);
            if (notaFinal < 0) notaFinal = 0;

            const finalStr = notaFinal.toFixed(2);
            document.getElementById(`s${sIdx}_total`).innerText = finalStr + " / 10";
            document.getElementById(`s${sIdx}_header_score`).innerText = finalStr;

            saveState();
        }

        function selectThematic(sIdx, qIdx, optIdx) {
            if(!state[sIdx]) state[sIdx] = {};
            state[sIdx][`q_${qIdx}`] = optIdx;
            saveState();
            
            for(let i=0; i<4; i++) {
                const btn = document.getElementById(`s${sIdx}_q${qIdx}_o${i}`);
                btn.className = 'opt-btn'; 
                if(i === optIdx) {
                    if(i === 0) btn.classList.add('active-mucho');
                    if(i === 1) btn.classList.add('active-bastante');
                    if(i === 2) btn.classList.add('active-poco');
                    if(i === 3) btn.classList.add('active-nada');
                }
            }
        }

        function buildTable(sIdx, partArray, prefix) {
            let html = `<table><thead><tr><th style="width:75%">Criterio</th><th style="width:25%">Nota</th></tr></thead><tbody>`;
            partArray.forEach((item, i) => {
                const savedVal = state[sIdx] && state[sIdx][`${prefix}${i}`] !== undefined ? state[sIdx][`${prefix}${i}`] : '';
                // Si el valor guardado no es vacío ni nulo, lo mostramos; sino, lo dejamos en blanco
                const displayVal = savedVal !== "" && savedVal !== null ? savedVal : "";
                html += `
                    <tr>
                        <td>${item.label}</td>
                        <td>
                            <input type="number" id="s${sIdx}_${prefix}${i}" step="0.1" min="0" max="${item.max}" value="${displayVal}" placeholder="Máx: ${item.max}" oninput="updateScore(${sIdx})">
                        </td>
                    </tr>
                `;
            });
            html += `</tbody></table>`;
            return html;
        }

        function render() {
            const container = document.getElementById('students-container');
            container.innerHTML = ""; 
            
            students.forEach((student, sIdx) => {
                const color = colors[sIdx % colors.length];
                const savedFaltas = state[sIdx] && state[sIdx]['faltas'] !== undefined ? state[sIdx]['faltas'] : '';
                const displayFaltas = savedFaltas !== "" && savedFaltas !== null ? savedFaltas : "";
                
                const details = document.createElement('details');
                details.className = 'student-detail';
                
                const summary = document.createElement('summary');
                summary.style.backgroundColor = color;
                summary.innerHTML = `
                    <span>${sIdx + 1}. ${student}</span>
                    <span class="header-score">Total: <span id="s${sIdx}_header_score">0.00</span> / 10</span>
                `;
                
                const content = document.createElement('div');
                content.className = 'content';

                let thematicHtml = '';
                thematicQuestions.forEach((qText, qIdx) => {
                    thematicHtml += `<div class="question-row"><div class="question-text">${qText}</div><div class="options-group">`;
                    optionLabels.forEach((optLabel, oIdx) => {
                        thematicHtml += `<button type="button" class="opt-btn" id="s${sIdx}_q${qIdx}_o${oIdx}" onclick="selectThematic(${sIdx}, ${qIdx}, ${oIdx})">${optLabel}</button>`;
                    });
                    thematicHtml += `</div></div>`;
                });

                content.innerHTML = `
                    <div class="cards-container" id="s${sIdx}_cards">
                        <div class="part-card card-a" onclick="showPart(${sIdx}, 'A')">
                            <h3>PARTE A<br><small>Comprensión (4 ptos)</small></h3>
                            <div class="score-display" id="s${sIdx}_btnA_score">0.00</div>
                        </div>
                        <div class="part-card card-b" onclick="showPart(${sIdx}, 'B')">
                            <h3>PARTE B<br><small>Lengua (3 ptos)</small></h3>
                            <div class="score-display" id="s${sIdx}_btnB_score">0.00</div>
                        </div>
                        <div class="part-card card-c" onclick="showPart(${sIdx}, 'C')">
                            <h3>PARTE C<br><small>Redacción (3 ptos)</small></h3>
                            <div class="score-display" id="s${sIdx}_btnC_score">0.00</div>
                        </div>
                    </div>

                    <div class="part-view" id="s${sIdx}_viewA">
                        <h3>A. COMPRENSIÓN DE UN TEXTO (4 PUNTOS) <button class="btn-back" onclick="showCards(${sIdx})">Volver</button></h3>
                        ${buildTable(sIdx, partA, 'a')}
                    </div>

                    <div class="part-view" id="s${sIdx}_viewB">
                        <h3>B. CONOCIMIENTO DE LENGUA (3 PUNTOS) <button class="btn-back" onclick="showCards(${sIdx})">Volver</button></h3>
                        ${buildTable(sIdx, partB, 'b')}
                    </div>

                    <div class="part-view" id="s${sIdx}_viewC">
                        <h3>C. REDACCIÓN DE UN TEXTO EN LENGUA CASTELLANA (3 PUNTOS) <button class="btn-back" onclick="showCards(${sIdx})">Volver</button></h3>
                        ${buildTable(sIdx, partC, 'c')}
                    </div>

                    <div class="global-section" id="s${sIdx}_global">
                        <div class="faltas-box">
                            Faltas Totales del Examen (-0.1 pts/falta): 
                            <input type="number" id="s${sIdx}_faltas" step="1" min="0" value="${displayFaltas}" placeholder="Cant." oninput="updateScore(${sIdx})">
                        </div>
                        <div class="total-box">
                            NOTA FINAL: <span id="s${sIdx}_total">0.00 / 10</span>
                        </div>
                    </div>

                    <details class="thematic-details">
                        <summary>Extracción de Ideas del Texto de Apoyo (Informativo, no altera la nota numérica)</summary>
                        <div class="thematic-content">${thematicHtml}</div>
                    </details>
                `;

                details.appendChild(summary);
                details.appendChild(content);
                container.appendChild(details);

                updateScore(sIdx);

                thematicQuestions.forEach((_, qIdx) => {
                    if (state[sIdx] && state[sIdx][`q_${qIdx}`] !== undefined) {
                        selectThematic(sIdx, qIdx, state[sIdx][`q_${qIdx}`]);
                    }
                });
            });
        }

        initData();
        render();

    </script>
</body>
</html>
